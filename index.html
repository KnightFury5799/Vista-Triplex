<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Triplex Designer | KnightFury5799</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icons Replacement (Simple SVG versions for browser compatibility)
        const Icon = ({ name }) => {
            const icons = {
                waves: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>,
                sun: <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
                layout: <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [activeFloor, setActiveFloor] = useState('ground');
            
            const floorData = {
                ground: {
                    title: "Level 0: Social Garden",
                    rooms: [
                        { name: "Sunken Living", pos: "top-0 left-0 w-[55%] h-[45%]", color: "bg-slate-100", details: "5x5 Floating Staircase" },
                        { name: "Dining Gallery", pos: "top-[45%] left-0 w-[55%] h-[20%]", color: "bg-white border", details: "North View" },
                        { name: "Pond Kitchen", pos: "bottom-0 left-0 w-[40%] h-[35%]", color: "bg-orange-50", details: "North-West Corner" },
                        { name: "Guest Bed", pos: "top-0 right-0 w-[40%] h-[40%]", color: "bg-stone-100", details: "10x11 sqft" },
                        { name: "East Foyer", pos: "top-[40%] right-0 w-[40%] h-[20%]", color: "bg-slate-200", details: "Main Entrance" },
                        { name: "Utilities", pos: "bottom-0 right-0 w-[55%] h-[35%]", color: "bg-gray-50", details: "Hidden Powder/Laundry" }
                    ]
                },
                upper1: {
                    title: "Level 1: Wellness Floor",
                    rooms: [
                        { name: "North Bed", pos: "bottom-0 left-0 w-[48%] h-[70%]", color: "bg-blue-50", details: "Pond Balcony" },
                        { name: "East Bed", pos: "top-0 right-0 w-[48%] h-[60%]", color: "bg-indigo-50", details: "Sunrise Balcony" },
                        { name: "Bridge Lounge", pos: "top-[40%] left-0 w-[45%] h-[25%]", color: "bg-emerald-50", details: "Indoor Planters" }
                    ]
                },
                upper2: {
                    title: "Level 2: Master & Studio",
                    rooms: [
                        { name: "Master Suite", pos: "top-0 left-0 w-full h-[55%]", color: "bg-amber-50", details: "North Pond Terrace" },
                        { name: "PC Station", pos: "bottom-0 right-0 w-[60%] h-[40%]", color: "bg-slate-800 text-white", details: "10x12 Studio" },
                        { name: "Premium Wash", pos: "bottom-0 left-0 w-[35%] h-[40%]", color: "bg-cyan-50", details: "West Wall" }
                    ]
                }
            };

            return (
                <div className="flex flex-col md:flex-row h-screen p-4 gap-4">
                    <div className="w-full md:w-64 bg-white rounded-2xl shadow-lg p-6 flex flex-col gap-4">
                        <h1 className="font-black text-xl text-indigo-600">VISTA TRIPLEX</h1>
                        {Object.keys(floorData).map(f => (
                            <button key={f} onClick={() => setActiveFloor(f)} 
                                className={`p-4 rounded-xl text-left font-bold transition-all ${activeFloor === f ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>
                                {f.toUpperCase()}
                            </button>
                        ))}
                    </div>

                    <div className="flex-1 flex flex-col">
                        <h2 className="text-2xl font-black mb-4">{floorData[activeFloor].title}</h2>
                        <div className="flex-1 bg-white rounded-3xl shadow-xl relative overflow-hidden border-8 border-white p-4">
                             <div className="relative h-full w-full border border-slate-200">
                                {floorData[activeFloor].rooms.map((room, i) => (
                                    <div key={i} className={`absolute flex flex-col items-center justify-center p-2 border border-white/40 shadow-sm rounded-lg group hover:z-10 ${room.pos} ${room.color}`}>
                                        <span className="font-bold text-[10px] md:text-xs uppercase">{room.name}</span>
                                        <span className="text-[8px] opacity-0 group-hover:opacity-100 transition-opacity">{room.details}</span>
                                    </div>
                                ))}
                             </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
